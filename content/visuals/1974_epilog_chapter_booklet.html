<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Whole Earth Epilog 1974 章节视觉册</title>
  <style>
    :root {
      --paper: #f4eddf;
      --sheet: #fffaf0;
      --ink: #241d16;
      --muted: #766d60;
      --line: #c8baa2;
      --blue: #245c83;
      --brown: #3b2a20;
      --tan: #d7c096;
      --red: #9f3f2e;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(rgba(36, 29, 22, 0.03) 1px, transparent 1px),
        var(--paper);
      background-size: 100% 23px;
      font-family: "Iowan Old Style", "Songti SC", "STSong", Georgia, serif;
      line-height: 1.65;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration-color: var(--blue);
      text-underline-offset: 3px;
    }

    .book {
      display: grid;
      grid-template-columns: 270px minmax(0, 1fr);
      min-height: 100vh;
      max-width: 100%;
      overflow-x: hidden;
    }

    .toc {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 26px 22px;
      border-right: 1px solid var(--line);
      background: rgba(244, 237, 223, 0.96);
      overflow-y: auto;
    }

    .toc h1 {
      margin: 0 0 8px;
      color: var(--blue);
      font-size: 20px;
      line-height: 1.22;
      letter-spacing: 0;
    }

    .toc p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .toc ol {
      margin: 0;
      padding-left: 28px;
      list-style: decimal-leading-zero;
      font-size: 14px;
    }

    .toc li {
      margin: 0 0 8px;
      padding-left: 2px;
    }

    .content {
      min-width: 0;
      max-width: 100%;
      overflow-x: hidden;
    }

    .chapter {
      padding: clamp(30px, 5vw, 70px) clamp(22px, 5vw, 76px);
      border-bottom: 1px solid var(--line);
    }

    .chapter-heading {
      max-width: 980px;
      margin: 0 0 24px;
      display: grid;
      gap: 10px;
    }

    .chapter-kicker {
      color: var(--blue);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h2 {
      margin: 0;
      max-width: 920px;
      font-size: clamp(31px, 4.3vw, 58px);
      line-height: 1.08;
      letter-spacing: 0;
      font-weight: 650;
    }

    .chapter-note {
      max-width: 850px;
      margin: 0;
      color: var(--muted);
      font-size: 18px;
    }

    .modules {
      display: grid;
      gap: 18px;
    }

    .module {
      display: grid;
      gap: 12px;
      padding: clamp(14px, 2vw, 22px);
      border: 1px solid var(--line);
      background: rgba(255, 250, 240, 0.62);
    }

    .module-copy {
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .module-head {
      display: grid;
      gap: 7px;
    }

    .module-number {
      color: var(--blue);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h3 {
      margin: 0;
      font-size: clamp(24px, 2.8vw, 36px);
      line-height: 1.16;
      letter-spacing: 0;
      font-weight: 650;
    }

    .anchor {
      margin: 0;
      padding-left: 13px;
      border-left: 3px solid var(--blue);
      font-size: 18px;
      line-height: 1.56;
    }

    .body {
      margin: 0;
      color: #342a20;
      font-size: 16px;
      line-height: 1.72;
    }

    .labels {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 0;
      margin: 2px 0 0;
      list-style: none;
    }

    .labels li {
      max-width: 100%;
      border: 1px solid var(--line);
      background: rgba(36, 92, 131, 0.08);
      color: var(--blue);
      padding: 3px 8px;
      font-size: 13px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .source {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .footer {
      padding: 28px clamp(22px, 5vw, 76px) 46px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    @media (max-width: 1000px) {
      .book {
        display: block;
      }

      .toc {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .toc ol {
        columns: 2;
      }

    }

    @media (max-width: 640px) {
      .toc,
      .chapter,
      .footer {
        padding-left: 18px;
        padding-right: 18px;
      }

      .toc ol {
        columns: 1;
      }

      .chapter-note {
        font-size: 16px;
      }

      .module {
        padding: 12px;
      }

      .anchor {
        font-size: 17px;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .book {
        display: block;
      }

      .toc {
        position: static;
        height: auto;
        border-right: 0;
      }

      .module {
        page-break-inside: avoid;
      }
    }
  </style>
</head>

  </main>

          ["关系不是控制", "关系不等于占有，理解不等于控制。", "Whole Earth 把 Buber 放在控制论旁边，是为了防止系统思考退化成另一种控制学。工具世界里也需要“我-你”：读者、土地、动物、材料、共同体和技术之间，不只是对象和功能的关系。", ["我-你", "关系", "不占有", "对话", "共同进化"], "leaf 8 / p.455", "https://archive.org/download/wholeearthepilog00unse/page/n8_w500.jpg"],
