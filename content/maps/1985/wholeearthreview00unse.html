des": [{"id": "node-0", "title": "电脑先抓住的不是手，而是注意力", "source_title": "电脑先抓住的不是手，而是注意力", "theme": "attention", "themes": ["attention", "culture", "power"], "pages": "leaf 1-2", "leaf": 1, "thumb": "https://archive.org/download/wholeearthreview00unse/page/n1_w500.jpg", "claim": "个人电脑先改变人的沉浸方式，再改变工作方式。", "role": "这组内容把电脑热从兴奋拉回身体经验：上瘾、节奏、迷恋、焦虑和自我辩护都比“效率提升”更早出现。它不是反电脑，而是在提醒读者：如果工具先占领注意力，所谓个人赋权会很快变成新的依赖。", "objects": ["电脑注意力陷阱", "神秘机器", "个人计算的矛盾痛苦", "工具上瘾", "自我观察"], "links": "连接“六个电脑神话”，因为注意力问题是技术神话最贴身的入口；也连接“电子小屋噩梦”，因为沉浸最终会改变人与人的距离。", "x": 35, "y": 22, "tilt": "-2deg", "color": "#d35f45"}, {"id": "node-1", "title": "六个电脑神话的拆解", "source_title": "六个电脑神话的拆解", "theme": "power", "themes": ["power", "attention", "culture"], "pages": "leaf 12-21", "leaf": 12, "thumb": "https://archive.org/download/wholeearthreview00unse/page/n12_w500.jpg", "claim": "这期真正反对的不是电脑，而是电脑神话。", "role": "长文把“干净机器、速度必然进步、信息自然带来自由、电脑适合所有问题”等信念逐个拆开。它要求读者把电脑放回电力、资源、劳动、教育和权力结构里看，而不是只盯着屏幕上的新奇感。", "objects": ["六个电脑疑问", "干净机器神话", "速度崇拜", "整体技术", "错误用途"], "links": "连接“信息乌托邦”，因为信息民主的承诺正是这些神话的政治版本；也连接“软件目录”，因为批判之后仍然要学会选择工具。", "x": 24, "y": 39, "tilt": "1deg", "color": "#8b5a3c"}, {"id": "node-2", "title": "信息乌托邦为什么不自动带来民主", "source_title": "信息乌托邦为什么不自动带来民主", "theme": "labor", "themes": ["labor", "power", "culture"], "pages": "leaf 22", "leaf": 22, "thumb": "https://archive.org/download/wholeearthreview00unse/page/n22_w500.jpg", "claim": "信息增多不等于公共生活变好。", "role": "这一组把电脑从个人沉迷推到社会结构：远程工作可能让人更孤立，信息网络可能加深自我封闭，民主也不会因为数据流通自动发生。它让中文读者提前看到今天平台社会的老问题：连接很多，但共同判断未必增加。", "objects": ["居家电脑化", "信息神话", "机器式独处", "远程工作", "公共判断"], "links": "连接“电脑把城市、办公室和隐私重新排布”，因为信息乌托邦一旦进入制度，就会改变劳动、城市和治理方式。", "x": 32, "y": 57, "tilt": "-1deg", "color": "#3f6f7f"}, {"id": "node-3", "title": "电脑把城市、办公室和隐私重新排布", "source_title": "电脑把城市、办公室和隐私重新排布", "theme": "privacy", "themes": ["privacy", "labor", "culture"], "pages": "leaf 31-32", "leaf": 31, "thumb": "https://archive.org/download/wholeearthreview00unse/page/n31_w500.jpg", "claim": "电脑不是桌面物件，而是空间和制度的 ", "themes": ["platform", "culture"], "pages": "leaf 101-103", "leaf": 101, "thumb": "scans/wholeearthreview00unse_n101_w500.png", "claim": "读者回声、勘误、订阅和财务也是工具文化的一部分。", "role": "尾部页面说明 Whole Earth 不只是内容容器，而是一套印刷时代的用户网络。读者来信、更新说明、邮购、财务透明和目录推广，让杂志本身成为一个可以反馈、维护和扩展的系统。", "objects": ["读者回声", "勘误更新", "财务透明", "邮购网络", "目录生态"], "links": "连接“软件目录”，因为两者都依赖持续更新；也连接“未来想象”，因为杂志已经在模拟平台式关系。", "x": 58, "y": 82, "tilt": "-1.5deg", "color": "#396f90"}, {"id": "node-8", "title": "封面、目录和合刊声明", "source_title": "封面、目录和合刊声明", "theme": "platform", "themes": ["platform", "privacy", "culture"], "pages": "leaf 57", "leaf": 57, "thumb": "scans/wholeearthreview00unse_n57_w500.png", "claim": "封面已经把电脑迷恋和电脑怀疑放在同一张图里。", "role": "这部分不只是入口页。封面和目录把电脑专题、软件目录和传统 Whole Earth 工具条目并置，说明本期要处理的是一次编辑身份转向：从一般工具文化进入电脑时代，同时又不愿被电脑时代吞掉。", "objects": ["封面议题", "目录结构", "合刊声明", "电脑专题", "软件目录"], "links": "连接全期所有节点，因为它说明这期为什么会在批判电脑的同时继续评测电脑。", "x": 72, "y": 73, "tilt": "1.8deg", "color": "#396f90"}, {"id": "features", "title": "专题文章：电脑时代的警惕清单", "source_title": "Features: 电脑时代的警惕清单", "theme": "power", "themes": ["power", "attention", "privacy"], "pages": "leaf 64", "leaf": 64, "thumb": "scans/wholeearthreview00unse_n64_w500.png", "claim": "专题文章构成本期的电脑免疫系统。", "role": "这一组集中处理个人沉迷、电脑神话、远程工作、信息民主和技术乐观主义。它们共同告诉读者：进入电脑时代不是先买机器，而是先学会识别技术叙事的诱惑和盲点。", "objects": ["电脑沉迷", "技术神话", "远程工作", "信息民主", "机器独处"], "links": "连接“软件目录”，因为没有这组警惕，后面的软件评测就会退化成消费推荐。", "x": 84, "y": 57, "tilt": "-1deg", "color": "#8b5a3c"}, {"id": "communications", "title": "通信栏目：监控、心理和机器寓言", "source_title": "Communications: 监控、心理和机器寓言", "theme": "culture", "themes": ["culture", "privacy", "platform"], "pages": "leaf 71", "leaf": 71, "thumb": "scans/wholeearthreview00unse_n71_w500.png", "claim": "通信栏目把电脑问题推进到心理、国家和寓言。", "role": "这里的重点是电脑如何塑造自我理解、公共形象和国家治理。心理学文本、隐私讨论和机器寓言放在一起，说明电脑既是个人镜子，也是制度工具。", "objects": ["电脑心理", "隐私国家", "公共形象", "机器寓言", "自我技术"], "links": "连接“办公室和隐私”，因为心理变化和制度变化在电脑时代互相支撑。", "x": 84, "y": 39, "tilt": "1.2deg", "color": "#4f7d62"}, {"id": "whole-systems-land-use-community-nomadics-", "title": "整体系统、土地、社区、迁徙、软技术与学习", "source_title": "Whole Systems / Land Use / Community / Nomadics / Soft Technology / Learning", "theme": "platform", "themes": ["platform", "culture", "power"], "pages": "leaf 78", "leaf": 78, "thumb": "scans/wholeearthreview00unse_n78_w500.png", "claim": "非电脑栏目保留了 Whole Earth 的完整尺度。", "role": "这一组把全期从屏幕拉回土地、社区、迁徙、软技术和学习。它让读者看到：电脑只是工具世界的一部分，真正的问题仍是怎样生活、怎样学习、怎样维护身体和地方。", "objects": ["土地使用", "社区工具", "迁徙生活", "软技术", "学习资源"], "links": "连接“电脑之外的生活工具”，共同抵抗把整本杂志读成单纯电脑专题。", "x": 74, "y": 22, "tilt": "-2deg", "color": "#396f90"}, {"id": "whole-earth-software-catalog-version-1-1", "title": "软件目录 1.1 更新", "source_title": "Whole Earth Software Catalog Version 1.1", "theme": "platform", "themes": ["platform", "culture"], "pages": "leaf 85", "leaf": 85, "thumb": "scans/wholeearthreview00unse_n85_w500.png", "claim": "软件更新把纸本目录变成持续维护的工具系统。", "role": "这一节点展示软件世界的速度：杂志不能只出版一次目录，而必须持续更新硬件、游戏、写作、通信和学习工具。它也说明 Whole Earth 已经把软件当成生活工具，而不是专业程序员的专属领域。", "objects": ["软件目录 1.1", "硬件更新", "游戏软件", "通信工具", "学习软件"], "links": "连接“批判之后继续评测软件”，因为两者共同构成成熟的软件阅读方式。", "x": 60, "y": 16, "tilt": "1.5deg", "color": "#396f90"}, {"id": "backscatter-business-self-maintenance", "title": "读者回声、业务和自我维护", "source_title": "Backscatter / Business / Self-Maintenance", "theme": "culture", "themes": ["culture", "platform"], "pages": "leaf 92", "leaf": 92, "thumb": "scans/wholeearthreview00unse_n92_w500.png", "claim": "尾声把读者、商业和自我维护重新接回工具文化。", "role": "这些页面处理读者反馈、商业运营和身体/心理维护。它们看似松散，却说明 Whole Earth 的工具观包含一个循环：内容被读者回应，组织需要财务维持，个人也需要持续维护自己。", "objects": ["读者来信", "业务维护", "自我维护", "订阅关系", "反馈循环"], "links": "连接“杂志把自己也做成系统”，因为这里最能看见杂志作为共同体工具的运行方式。", "x": 52, "y": 35, "tilt": "-1deg", "color": "#4f7d62"}]}, "issues": [{"id": "wholeearthreview00unse", "short": "Jan", "label": "No. 44", "title": "Whole Earth Review, January 1985", "pages": 108, "flagged": "31 / 108", "accent": "#d35f45", "scanBase": "https://archive.org/download/wholeearthreview00unse/page/n{leaf}_w500.jpg"}, {"id": "wholeearthreview00unse_0", "short": "Mar", "label": "No. 45", "title": "Whole Earth Review, March 1985", "pages": 110, "flagged": "26 / 110", "accent": "#5f8a5f", "scanBase": "https://archive.org/download/wholeearthreview00unse_0/page/n{leaf}_w500.jpg"}, {"id": "wholeearthreview00unse_1", "short": "May", "label": "No. 46", "title": "Whole Earth Review, May 1985", "pages": 118, "flagged": "33 / 118", "accent": "#8368b3", "scanBase": "https://archive.org/download/wholeearthreview00unse_1/page/n{leaf}_w500.jpg"}, {"id": "wholeearthreview00unse_2", "short": "Jul", "label": "No. 47", "title": "Whole Earth Review, July 1985", "pages": 124, "flagged": "45 / 124", "accent": "#3d7f91", "scanBase": "https://archive.org/download/wholeearthreview00unse_2/page/n{leaf}_w500.jpg"}, {"id": "wholeearthreview00unse_3", "short": "Fall", "label": "No. 48", "title": "Whole Earth Review, Fall 1985", "pages": 148, "flagged": "27 / 148", "accent": "#bb6c35", "scanBase": "https://archive.org/download/wholeearthreview00unse_3/page/n{leaf}_w500.jpg"}, {"id": "wholeearthreview00unse_4", "short": "Winter", "label": "No. 49", "title": "Whole Earth Review, Winter 1985", "pages": 146, "flagged": "25 / 146", "accent": "#426f7f", "scanBase": "https://archive.org/download/wholeearthreview00unse_4/page/n{leaf}_w500.jpg"}, {"id": "wholeearthsoftwa00unse_3", "short": "Software", "label": "Software Catalog", "title": "Whole Earth Software Catalog 2.0, Fall 1985", "pages": 228, "flagged": "58 / 228 refined", "accent": "#d8912f", "scanBase": "https://archive.org/download/wholeearthsoftwa00unse_3/page/n{leaf}_w500.jpg"}]}</script>
  <main class="desk">
    <header class="rail"><div><div class="identity"><span class="stamp" id="issueLabel"></span><strong id="issueTitle"></strong><span id="issueSubtitle"></span></div><nav class="issue-jump" id="issueJump"></nav></div><nav class="modes" id="modes"></nav></header>
    <section class="workspace"><aside class="routes"><h2>暗线</h2><div class="theme-list" id="themeList"></div><p class="source-note" id="sourceNote"></p></aside><section class="map-stage" aria-label="知识地图"><div class="orbit-label"><span class="stamp" id="leafCount"></span><span>点击节点看关系</span></div><div class="scan-strip" id="scanStrip"></div><svg class="connections" id="connections"></svg><div class="center"><div><b id="centerTitle"></b><span id="centerSub"></span></div></div><div class="nodes" id="nodes"></div><div class="mini-timeline" id="timeline"></div></section><aside class="inspector"><h2>当前节点</h2><section class="reader-card"><div class="kicker"><span id="panelTheme"></span><span id="panelPages"></span></div><h3 id="panelTitle"></h3><p id="panelClaim"></p></section><section class="field"><b>这一章解决什么问题</b><p id="panelRole"></p></section><section class="field"><b>关键物件</b><ul id="panelObjects"></ul></section><section class="field"><b>连接关系</b><p id="panelLinks"></p></section><section class="evidence"><a id="scanLink" href="#" target="_blank" rel="noreferrer">打开对应扫描页</a><small id="panelEvidence"></small></section></aside></section>
  </main>
  <script>
    const payload = JSON.parse(document.getElementById('map-data').textContent);
    const issue = payload.issue;
    const map = payload.map;
    const nodes = map.nodes;
    const themes = map.themes;
    const byId = Object.fromEntries(nodes.map(n => [n.id, n]));
    const edges = [];
    for (let i = 0; i < nodes.length - 1; i++) edges.push([nodes[i].id, nodes[i + 1].id]);
    map.modes.forEach(m => {
      if (!m.nodes) return;
      for (let i = 0; i < m.nodes.length - 1; i++) edges.push([m.nodes[i], m.nodes[i + 1]]);
    });
    let activeTheme = null;
    let activeMode = 'all';
    let activeNode = nodes[Math.min(1, nodes.length - 1)].id;
    function scan(leaf) { return issue.scanBase.replace('{leaf}', leaf); }
    function nodeThemes(node) {
      return node.themes && node.themes.length ? node.themes : [node.theme];
    }
    function boot() {
      document.getElementById('issueLabel').textContent = issue.label;
      document.getElementById('issueTitle').textContent = issue.title;
      document.getElementById('issueSubtitle').textContent = map.subtitle;
      document.getElementById('sourceNote').textContent = map.source_note;
      document.getElementById('leafCount').textContent = `${issue.pages} leaves`;
      document.getElementById('centerTitle').textContent = map.center;
      document.getElementById('centerSub').textContent = map.center_sub;
      document.documentElement.style.setProperty('--accent', issue.accent);
      document.getElementById('issueJump').innerHTML = payload.issues.map(item => `<a class="issue-link ${item.id === issue.id ? 'active' : ''}" href="${item.id}.html">${item.short}</a>`).join('');
      document.getElementById('modes').innerHTML = map.modes.map(m => `<button class="mode ${m.id === activeMode ? 'active' : ''}" data-mode="${m.id}">${m.title}</button>`).join('');
      document.getElementById('timeline').style.setProperty('--cols', map.timeline.length);
      document.getElementById('timeline').innerHTML = map.timeline.map(x => `<div class="phase">${x}</div>`).join('');
      document.getElementById('scanStrip').innerHTML = nodes.slice(0, 4).map(n => `<a class="scan-card" href="${scan(n.leaf)}" target="_blank" rel="noreferrer"><img src="${n.thumb}" alt="${n.pages}" loading="eager"><span>${n.pages}</span></a>`).join('');
      document.querySelectorAll('.scan-card img').forEach(img => {
        img.onerror = () => {
          img.closest('.scan-card').classList.add('missing');
          img.closest('.scan-card').textContent = 'scan';
        };
      });
    }
    function renderThemes() {
      themeList.innerHTML = '';
      themes.forEach(t => {
        const count = nodes.filter(n => nodeThemes(n).includes(t.id)).length;
        const b = document.createElement('button');
        b.className = 'theme';
        b.style.setProperty('--theme-color', t.color);
        b.dataset.theme = t.id;
        b.innerHTML = `<i></i><div class="theme-copy"><b>${t.title}<span class="theme-count">${count}</span></b><span>${t.text}</span></div>`;
        b.onclick = () => {
          activeTheme = activeTheme === t.id ? null : t.id;
          update();
        };
        themeList.appendChild(b);
      });
    }
    function renderNodes() {
      nodesEl = document.getElementById('nodes');
      nodesEl.innerHTML = '';
      nodes.forEach(n => {
        const b = document.createElement('button');
        b.className = 'node';
        b.type = 'button';
        b.dataset.id = n.id;
        b.dataset.theme = n.theme;
        b.style.left = `${n.x}%`;
        b.style.top = `${n.y}%`;
        b.style.setProperty('--tilt', n.tilt);
        b.style.setProperty('--node-color', n.color);
        const theme = themes.find(t => t.id === n.theme);
        b.innerHTML = `<b>${n.title}</b><span>${n.pages}</span><em>${theme ? theme.title : n.theme}</em>`;
        b.onclick = () => setNode(n.id);
        nodesEl.appendChild(b);
      });
    }
    function drawEdges() {
      const svg = document.getElementById('connections');
      svg.innerHTML = '';
      const st = svg.getBoundingClientRect();
      if (!st.width || matchMedia('(max-width:680px)').matches) return;
      const c = { x: st.width / 2, y: st.height / 2 };
      const seen = new Set();
      edges.forEach(([f, t]) => {
        const k = f + '>' + t;
        if (seen.has(k)) return;
        seen.add(k);
        const a = document.querySelector(`.node[data-id="${f}"]`);
        const b = document.querySelector(`.node[data-id="${t}"]`);
        if (!a || !b) return;
        const ar = a.getBoundingClientRect();
        const br = b.getBoundingClientRect();
        const ax = ar.left + ar.width / 2 - st.left;
        const ay = ar.top + ar.height / 2 - st.top;
        const bx = br.left + br.width / 2 - st.left;
        const by = br.top + br.height / 2 - st.top;
        const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        p.setAttribute('d', `M ${ax} ${ay} Q ${c.x} ${c.y} ${bx} ${by}`);
        if (f === activeNode || t === activeNode) p.classList.add('strong');
        svg.appendChild(p);
      });
    }
    function setNode(id) {
      activeNode = id;
      const n = byId[id] || nodes[0];
      const theme = themes.find(t => t.id === n.theme) || { title: n.theme };
      panelTheme.textContent = nodeThemes(n).map(id => (themes.find(t => t.id === id) || { title: id }).title).join(' / ');
      panelPages.textContent = n.pages;
      panelTitle.textContent = n.title;
      panelClaim.textContent = n.claim;
      panelRole.textContent = n.role;
      panelObjects.innerHTML = n.objects.map(object => `<li>${object}</li>`).join('');
      panelLinks.textContent = n.links;
      scanLink.href = scan(n.leaf);
      panelEvidence.textContent = `${n.pages} / 原始扫描图可用来复核 OCR、版式和图像。`;
      update();
      drawEdges();
    }
    function update() {
      const mode = map.modes.find(m => m.id === activeMode) || map.modes[0];
      const filter = mode.nodes ? new Set(mode.nodes) : null;
      document.querySelectorAll('.theme').forEach(b => b.classList.toggle('active', activeTheme === b.dataset.theme));
      document.querySelectorAll('.node').forEach(b => {
        const n = byId[b.dataset.id];
        const hide = (activeTheme && !nodeThemes(n).includes(activeTheme)) || (filter && !filter.has(n.id));
        b.classList.toggle('dim', hide);
        b.classList.toggle('active', n.id === activeNode);
      });
    }
    document.addEventListener('click', e => {
      const b = e.target.closest('.mode');
      if (!b) return;
      activeMode = b.dataset.mode;
      document.querySelectorAll('.mode').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      update();
    });
    boot();
    renderThemes();
    renderNodes();
    setNode(activeNode);
    addEventListener('resize', drawEdges);
  </script>
</body>
</html>
