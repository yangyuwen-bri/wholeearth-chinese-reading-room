  <script id="map-data" type="application/json">{"issue": {"id": "wholeearthsoftwa00unse_3", "short": "Software", "label": "Software Catalog", "title": "Whole Earth Software Catalog 2.0, Fall 1985", "subtitle": "从工具判断进入编程、网络与学习", "pages": 228, "accent": "#d8912f", "scanBase": "https://archive.org/download/wholeearthsoftwa00unse_3/page/n{leaf}_w500.jpg"}, "themes": [{"id": "judgment", "title": "判断工具", "text": "软件不是功能表，而是流程、支持、文档、价格和长期使用的集合。", "color": "#d8912f"}, {"id": "platform", "title": "平台生态", "text": "硬件选择会决定你能进入哪个软件世界，标准和兼容性比参数更硬。", "color": "#3d7f91"}, {"id": "making", "title": "生产与创作", "text": "游戏、写作、表格、数据库和图形正在训练新的交互审美和工作方式。", "color": "#5f8a5f"}, {"id": "network", "title": "连接社会", "text": "调制解调器、在线服务和 BBS 让个人电脑开始变成公共空间。", "color": "#a94f38"}, {"id": "literacy", "title": "编程素养", "text": "普通用户不必成为职业程序员，但要理解机制、流程、风格和系统。", "color": "#8368b3"}], "nodes": [{"id": "how-to-use", "title": "先建立软件判断法", "theme": "judgment", "pages": "p. 2-3 / leaf 3-4", "leaf": 3, "claim": "这本书不是穷尽软件清单，而是一次比较、试用、争论之后形成的工具判断系统。", "role": "开篇先说明 2.0 版为何比第一版更可靠：市场稍微稳定、标准更牢、读者和评测者反馈已经回流。它把个人电脑称作 skill machines，所以全书按人的活动组织，而不是按厂商、语言或机器组织。", "objects": ["2.0 版更新", "street price", "skill machines", "多声部评测"], "links": "连接 Shopping，因为判断法马上落到购买；也连接 Programming，因为软件素养最终要求理解机制。", "x": 18, "y": 22, "tilt": "-2deg", "color": "#d8912f"}, {"id": "shopping", "title": "买软件前先定义问题", "theme": "judgment", "pages": "p. 4-9 / leaf 6-11", "leaf": 6, "claim": "不要先问哪个软件最火，先问你要改变哪个流程、怎样衡量改变。", "role": "Shopping 是全书地基。它提醒读者少买、深用、重视支持、警惕拷贝保护，并把“好用”“可靠”“快”翻译成可观察标准。这里的软件购买像需求分析，而不是消费冲动。", "objects": ["需求标准", "支持服务", "拷贝保护", "How to Buy Software"], "links": "连接 Buying，因为判断会进入供应链；连接今天的 SaaS、AI 工具采购逻辑。", "x": 34, "y": 18, "tilt": "1deg", "color": "#d8912f"}, {"id": "hardware-buying", "title": "机器选择就是生态选择", "theme": "platform", "pages": "p. 14-27 / leaf 16-29", "leaf": 16, "claim": "买硬件不是买参数，而是在选择软件库、兼容性、售后和未来标准。", "role": "Hardware 和 Buying 把 Apple II、Commodore 64、IBM PC、Mac、UNIX PC 与零售店、邮购、公共领域软件、用户组放在一起看。Mac 有未来感但软件少，IBM PC 不迷人却正在成为默认生态。", "objects": ["IBM PC", "Macintosh", "UNIX PC", "用户组", "公共领域软件"], "links": "连接 Platform 主题，也连接 Telecommunicating，因为网络服务同样受机器和标准限制。", "x": 52, "y": 21, "tilt": "-1deg", "color": "#3d7f91"}, {"id": "playing", "title": "游戏是交互设计实验室", "theme": "making", "pages": "p. 28-45 / leaf 30-47", "leaf": 30, "claim": "游戏最早让大众体验规则、反馈、模拟、建造和沉浸。", "role": "Playing 不是怀旧游戏清单。M.U.L.E.、Seven Cities of Gold、Pinball Construction Set、Zork、Ultima 等软件展示了策略、经济、叙事、物理和角色扮演如何变成可操作系统。", "objects": ["M.U.L.E.", "Seven Cities of Gold", "Pinball Construction Set", "Zork", "Ultima"], "links": "连接 Learning，因为许多学习软件继承游戏的反馈结构；连接 Programming，因为可改造游戏把玩家推向作者。", "x": 70, "y": 30, "tilt": "2deg", "color": "#5f8a5f"}, {"id": "writing", "title": "文字处理改变写作动作", "theme": "making", "pages": "p. 46-63 / leaf 48-65", "leaf": 48, "claim": "好写作软件的审美在日常动作里：移动、删除、打印、重排、找回位置。", "role": "Writing 章关心工具怎样改变修改和重组文本的勇气。它故意列出“不要买的理由”，用限制、脚注、打印、文件大小、兼容性来抵抗广告式功能表。", "objects": ["WordStar", "WordPerfect", "XyWrite", "Microsoft Word", "不要买的理由矩阵"], "links": "连接 Analyzing 和 Organizing，因为文字、数字和资料都在训练新型办公室判断。", "x": 80, "y": 48, "tilt": "-1.5deg", "color": "#5f8a5f"}, {"id": "analyzing-organizing", "title": "电子表格与数据库让用户半编程", "theme": "making", "pages": "p. 64-93 / leaf 66-95", "leaf": 66, "claim": "非程序员开始用模型、字段、关系和流程组织现实。", "role": "Analyzing 从 VisiCalc 到 1-2-3，说明表格是无代码建模的早期形态；Organizing 则把数据库看作命名、分类、找回和重新连接信息的工具。强大到一定程度，数据库就接近编程。", "objects": ["VisiCalc", "Lotus 1-2-3", "FileVision", "dBASE II", "ThinkTank"], "links": "连接 Programming，因为表格和数据库让普通用户进入程序化思维；连接今天的 Notion、Airtable、BI 和向量库。", "x": 68, "y": 68, "tilt": "1deg", "color": "#5f8a5f"}, {"id": "accounting-managing", "title": "办公室在一体化平台和小工具之间摇摆", "theme": "platform", "pages": "p. 94-121 / leaf 96-123", "leaf": 96, "claim": "商业软件一旦进入现金流、项目和行业流程，就变成组织基础设施。", "role": "Accounting 要求像找会计师一样找软件；Managing 则比较 AppleWorks、Framework、Symphony、SideKick 等工具。一条路线是一体化平台，一条路线是贴着工作流的小工具生态。", "objects": ["AppleWorks", "Framework", "Symphony", "SideKick", "行业软件"], "links": "连接 Hardware，因为平台选择影响办公室工具；也连接 Shopping，因为商业软件最需要长期支持。", "x": 47, "y": 77, "tilt": "-2deg", "color": "#3d7f91"}, {"id": "drawing", "title": "视觉生产开始民主化", "theme": "making", "pages": "p. 122-137 / leaf 124-139", "leaf": 124, "claim": "图形软件把儿童涂鸦、商业图表、桌面出版、CAD 和艺术放到同一条谱系。", "role": "Drawing 从显卡、显示器、打印机、绘图仪讲起，再进入 MacPaint、MacDraw、ReadySetGo、PC Paint、AutoCAD。它记录了图形界面、桌面出版和 CAD 从专业站点走向个人电脑的瞬间。", "objects": ["MacPaint", "MacDraw", "ReadySetGo", "AutoCAD", "CADKEY"], "links": "连接今天的 Figma、Canva、Blender 和 AI 图像工具；也连接 Playing，因为图形和交互共同训练用户感知。", "x": 28, "y": 72, "tilt": "1.5deg", "color": "#5f8a5f"}, {"id": "telecommunicating", "title": "电脑首先是通信设备", "theme": "network", "pages": "p. 138-157 / leaf 140-159", "leaf": 140, "claim": "调制解调器和在线服务让个人电脑从私人机器变成社会空间。", "role": "Telecommunicating 讨论 CompuServe、The Source、Delphi、EIES、公告板、通信软件、文件传输和局域网。它最有价值的地方是把网络看成人类活动：公共法案、远程讨论、文件共享、社区组织都已经出现。", "objects": ["CompuServe", "Delphi", "EIES", "BBS", "1200 baud modem"], "links": "连接 Network 主题，也连接 Whole Earth Review 的 WELL 和读者共同体。", "x": 17, "y": 52, "tilt": "-1deg", "color": "#a94f38"}, {"id": "programming", "title": "编程是一种审美活动", "theme": "literacy", "pages": "p. 158-174 / leaf 159-176", "leaf": 159, "claim": "编程首先是组织复杂性的能力，其次才是某种语言或职业身份。", "role": "Programming 从 Weinberg 的汽车机械师类比出发，把普通用户带向程序风格、C、Pascal、BASIC、FORTH、Micro-Prolog、UNIX、结构化设计、软件工程和 Utilities。这里的审美不浪漫化代码，而是强调清晰、风格、可读性、工具环境和人的判断。", "objects": ["The Elements of Programming Style", "C", "FORTH", "Micro-Prolog", "Norton Utilities"], "links": "连接 Analyzing/Organizing，因为表格和数据库已经让用户半编程；连接 Learning，因为 Logo 和微世界把编程变成学习环境。", "x": 31, "y": 34, "tilt": "2deg", "color": "#8368b3"}, {"id": "learning", "title": "学习软件不该只是电子练习册", "theme": "literacy", "pages": "p. 175-191 / leaf 177-193", "leaf": 177, "claim": "好的学习软件要让错误变成探索，让电脑成为可操纵的微世界。", "role": "Learning 反对把工作簿搬到屏幕上。Logo、Rocky's Boots、Robot Odyssey、The Voyage of the Mimi 等软件展示了模拟、反馈、图形和现实经验如何结合。", "objects": ["Logo", "Rocky's Boots", "Robot Odyssey", "The Voyage of the Mimi", "Reader Rabbit"], "links": "连接 Playing 和 Programming，因为学习在这里不是灌输，而是进入系统、试错和建构。", "x": 51, "y": 41, "tilt": "-1deg", "color": "#8368b3"}, {"id": "etc-update", "title": "收尾其实是未来接口", "theme": "network", "pages": "p. 192-224 / leaf 194-226", "leaf": 194, "claim": "书末的互动视频、音乐、天文、接口和更新，把目录变成持续变化的系统。", "role": "Etc.、Inside Point、Last-Minute Supplement 和索引说明这本书不是封闭书籍，而是一个版本化的知识系统。软件太快，目录必须承认自己会过期，并通过 Review、补遗、索引和公开利益关系维持可信度。", "objects": ["互动视频", "音乐软件", "硬件接口", "Inside Point", "Last-Minute Supplement"], "links": "连接 How to Use This Book，因为更新机制就是这本目录的方法论；也连接 WebGL 总览里的出版系列。", "x": 60, "y": 58, "tilt": "1.5deg", "color": "#a94f38"}], "timeline": ["判断", "平台", "游戏", "写作", "数据", "图形", "网络", "编程", "学习", "更新"]}</script>

        b.onclick = () => setNode(n.id);
        nodesEl.appendChild(b);
      });
    }
    function drawEdges() {
      const svg = connections;
      svg.innerHTML = "";
      const st = svg.getBoundingClientRect();
      if (!st.width || matchMedia("(max-width:680px)").matches) return;
      const c = {x: st.width / 2, y: st.height / 2};
      edges.forEach(([f, t]) => {
        const a = document.querySelector(`.node[data-id="${f}"]`);
        const b = document.querySelector(`.node[data-id="${t}"]`);
        if (!a || !b) return;
        const ar = a.getBoundingClientRect();
        const br = b.getBoundingClientRect();
        const ax = ar.left + ar.width / 2 - st.left;
        const ay = ar.top + ar.height / 2 - st.top;
        const bx = br.left + br.width / 2 - st.left;
        const by = br.top + br.height / 2 - st.top;
        const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
        p.setAttribute("d", `M ${ax} ${ay} Q ${c.x} ${c.y} ${bx} ${by}`);
        if (f === activeNode || t === activeNode) p.classList.add("strong");
        svg.appendChild(p);
      });
    }
    function update() {
      document.querySelectorAll(".theme").forEach(b => b.classList.toggle("active", activeTheme === b.dataset.theme));
      document.querySelectorAll(".node").forEach(b => {
        const n = byId[b.dataset.id];
        b.classList.toggle("dim", activeTheme && n.theme !== activeTheme);
        b.classList.toggle("active", n.id === activeNode);
      });
      drawEdges();
    }
    function setNode(id) {
      activeNode = id;
      const n = byId[id] || nodes[0];
      const t = themeById[n.theme];
      panelTheme.textContent = t.title;
      panelPages.textContent = n.pages;
      panelTitle.textContent = n.title;
      panelClaim.textContent = n.claim;
      panelRole.textContent = n.role;
      panelObjects.innerHTML = n.objects.map(o => `<li>${o}</li>`).join("");
      panelLinks.textContent = n.links;
      scanLink.href = scan(n.leaf);
      panelEvidence.textContent = `${n.pages} / Archive 原扫描可复核 OCR、版式和图片。`;
      update();
    }
    timeline.innerHTML = data.timeline.map(x => `<div class="phase">${x}</div>`).join("");
    renderThemes();
    renderNodes();
    setNode(activeNode);
    addEventListener("resize", drawEdges);
  </script>
</body>
</html>
