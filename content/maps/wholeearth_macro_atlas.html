  <script>
    const data = JSON.parse(document.getElementById('macro-data').textContent);
    const byCollection = Object.fromEntries(data.series.map(s => [s.collection, s]));
    let activeSeries = null;
    let query = '';
    const detail = document.getElementById('detail');
    const issuesEl = document.getElementById('issues');
    const search = document.getElementById('search');

    function renderDetail() {
      const s = activeSeries ? byCollection[activeSeries] : null;
      if (!s) {
        detail.innerHTML = `<h3>六种出版形态</h3><p>Whole Earth 不是一本单一杂志，而是一组从工具目录、思想季刊、综合 Review、软件目录，到后期主题杂志和专题书的出版谱系。先按类型理解，再进入具体年份和目录页，阅读会更稳。</p>
          <div class="pills">${data.top_topics.slice(0,10).map(([k,v]) => `<span>${k}<b>${v}</b></span>`).join('')}</div>`;
        return;
      }
      detail.innerHTML = `<h3>${s.zh}</h3><p><b>${s.role}</b>。${s.summary}</p>
        <div class="pills">${s.topics.map(([k,v]) => `<span>${k}<b>${v}</b></span>`).join('')}</div>
        <p>常见目录词：${s.sections.slice(0,8).map(([k,v]) => `${k}（${v}）`).join('、') || '本地目录词不足，需继续人工整理。'}</p>`;
    }
    function matches(issue) {
      if (activeSeries && issue.collection !== activeSeries) return false;
      if (!query) return true;
      const hay = [issue.title, issue.collection, issue.year, issue.season, ...(issue.topics || []), ...((issue.content_map || []).map(x => x.title || ''))].join(' ').toLowerCase();
      return hay.includes(query.toLowerCase());
    }
    function renderIssues() {
      const list = data.issues.filter(matches);
      issuesEl.innerHTML = list.map(issue => `<article class="issue">
        <img src="${issue.cover_url || ''}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
        <div><strong>${issue.title}</strong><small>${issue.collection} · ${issue.year} ${issue.season || ''} · ${issue.pages || '?'} pages · ${(issue.topics || []).join(' / ') || '未标注主题'}</small></div>
        <a href="${issue.archive_url || issue.url || '#'}" target="_blank" rel="noreferrer">原始扫描</a>
      </article>`).join('') || '<p class="note">没有匹配结果。</p>';
    }
    function setSeries(name) {
      activeSeries = activeSeries === name ? null : name;
      document.querySelectorAll('[data-series]').forEach(el => el.classList.toggle('active', activeSeries === el.dataset.series));
      renderDetail();
      renderIssues();
    }
    document.querySelectorAll('[data-series]').forEach(el => el.addEventListener('click', () => setSeries(el.dataset.series)));
    search.addEventListener('input', e => { query = e.target.value.trim(); renderIssues(); });
    renderDetail();
    renderIssues();
  </script>
